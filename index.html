<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Cinematic Reel</title>

<style>
    :root {
        --bg-color: #000000;
        --accent-red: #ff4d4d;
        --nebula-glow: rgba(100, 50, 255, 0.12);
    }

    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: var(--bg-color);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        font-family: 'Georgia', serif;
    }

    /* Cinematic Edges */
    body::before {
        content: '';
        position: fixed;
        inset: 0;
        box-shadow: inset 0 0 200px rgba(0,0,0,1);
        pointer-events: none;
        z-index: 50;
    }

    /* Background Effects */
    .nebula-bg {
        position: fixed;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle at 30% 30%, var(--nebula-glow) 0%, transparent 40%);
        animation: nebulaMove 20s linear infinite;
        opacity: 0;
        z-index: 1;
        transition: opacity 3s ease;
    }

    @keyframes nebulaMove {
        0% { transform: translate(-20%, -20%) rotate(0deg); }
        100% { transform: translate(-10%, -10%) rotate(360deg); }
    }

    #canvas {
        position: fixed;
        inset: 0;
        z-index: 2;
        pointer-events: none;
        opacity: 0;
        transition: opacity 2s ease;
    }

    /* Initial Overlay */
    #overlay {
        position: fixed;
        inset: 0;
        background: black;
        z-index: 100;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: background 2s ease;
    }

    /* Play Button (No Effect) */
    #playBtn {
        width: 80px;
        height: 80px;
        cursor: pointer;
        fill: var(--accent-red);
        z-index: 101;
        transition: opacity 0.5s ease;
    }

    /* Surprise Text Logic */
    .surprise-text {
        color: white;
        font-size: 18px;
        letter-spacing: 1.5px;
        text-align: center;
        z-index: 105;
        transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        margin-top: 20px; /* सुरुवातीला बटनच्या खाली अंतर */
        text-shadow: 0 0 10px rgba(255,255,255,0.4);
    }

    /* जेव्हा प्ले बटन दाबले जाते तेव्हाची पोझिशन */
    .text-active {
        position: absolute;
        top: calc(50% + 230px); /* फोटो रीलच्या खाली सेट केले */
        margin-top: 0;
        opacity: 0.9;
    }

    /* Photo Box */
    .recorder-box {
        width: 85vw;
        max-width: 280px;
        aspect-ratio: 5/7;
        overflow: hidden;
        border-radius: 12px;
        position: relative;
        z-index: 40;
        opacity: 0;
        transform: scale(0.9);
        transition: all 2s ease;
        box-shadow: 0 0 50px rgba(0,0,0,1);
        border: 1px solid rgba(255,255,255,0.05);
    }

    .reel {
        display: flex;
        flex-direction: column;
        height: 100%;
        animation: smoothSlide 9s cubic-bezier(0.45, 0, 0.55, 1) infinite;
        animation-play-state: paused;
    }

    .photo-card { width: 100%; height: 100%; flex-shrink: 0; }
    .photo-card img { width: 100%; height: 100%; object-fit: cover; }

    @keyframes smoothSlide {
        0%, 28% { transform: translateY(0); }
        33%, 61% { transform: translateY(-100%); }
        66%, 94% { transform: translateY(-200%); }
        100% { transform: translateY(-300%); }
    }

    /* End Message */
    #thankYou {
        position: fixed;
        color: white;
        font-size: 26px;
        opacity: 0;
        z-index: 200;
        transition: opacity 2s ease;
        text-align: center;
    }

    .visible { opacity: 1 !important; }
    .hidden { opacity: 0 !important; pointer-events: none; }

</style>
</head>
<body>

    <div class="nebula-bg" id="nebula"></div>
    <canvas id="canvas"></canvas>

    <div id="overlay">
        <svg id="playBtn" viewBox="0 0 64 64">
            <circle cx="32" cy="32" r="30" />
            <polygon points="26,20 26,44 46,32" fill="white"/>
        </svg>
        <p class="surprise-text" id="msgText">I have a Surprise ❤️</p>
    </div>

    <div class="recorder-box" id="box">
        <div class="reel" id="reel">
            <div class="photo-card"><img src="photo1.jpg"></div>
            <div class="photo-card"><img src="photo2.jpg"></div>
            <div class="photo-card"><img src="photo3.jpg"></div>
            <div class="photo-card"><img src="photo1.jpg"></div>
        </div>
    </div>

    <div id="thankYou">Thank You 🐣</div>
    <audio id="bgMusic" src="music.mp3"></audio>

<script>
    const playBtn = document.getElementById('playBtn');
    const msgText = document.getElementById('msgText');
    const music = document.getElementById('bgMusic');
    const overlay = document.getElementById('overlay');
    const box = document.getElementById('box');
    const reel = document.getElementById('reel');
    const thankYou = document.getElementById('thankYou');
    const canvas = document.getElementById('canvas');
    const nebula = document.getElementById('nebula');

    playBtn.addEventListener('click', () => {
        music.play();
        
        // १. प्ले बटन लपवणे
        playBtn.classList.add('hidden');
        overlay.style.background = "transparent";
        
        // २. टेक्स्टला रीलच्या खाली हलवणे
        msgText.classList.add('text-active');
        
        // ३. फोटो बॉक्स आणि बॅकग्राउंड इफेक्ट सुरू करणे
        setTimeout(() => {
            box.classList.add('visible');
            box.style.transform = "scale(1)";
            nebula.classList.add('visible');
            canvas.classList.add('visible');
            reel.style.animationPlayState = 'running';
            initParticles();
        }, 500);
    });

    music.onended = function() {
        overlay.style.background = "black";
        overlay.classList.remove('hidden');
        box.classList.remove('visible');
        msgText.classList.remove('visible');
        nebula.classList.remove('visible');
        canvas.classList.remove('visible');
        
        setTimeout(() => {
            thankYou.classList.add('visible');
        }, 1500);
    };

    // Particles Logic
    const ctx = canvas.getContext('2d');
    let particles = [];
    function initParticles() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        for(let i=0; i<60; i++) {
            particles.push({
                x: Math.random()*canvas.width,
                y: Math.random()*canvas.height,
                size: Math.random()*1.5+0.5,
                speed: Math.random()*0.3+0.1,
                opacity: Math.random()
            });
        }
        animate();
    }
    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
            p.y -= p.speed;
            if(p.y < 0) p.y = canvas.height;
            ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        });
        requestAnimationFrame(animate);
    }
</script>

</body>
</html>
