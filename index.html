<style>
.box{
  width:90vw;
  max-width:260px;
  aspect-ratio:5/7;
  overflow:hidden;
  position:relative;
}

.photo{
  position:absolute;
  width:100%;
  height:100%;
  top:100%; /* bottom ऐवजी top वापर */
  left:0;
}

</style>

<script>
let photos = document.querySelectorAll(".photo");
let index = 0;
let started = false;
let interval;

function start(){
  if(started) return;
  started = true;

  const music = document.getElementById("music");
  music.play();

  let totalTime = 30; // change this
  let perPhoto = totalTime / photos.length;

  show();
  interval = setInterval(show, perPhoto * 1000);

  music.onended = () => clearInterval(interval);
}

function show(){
  let current = photos[index];

  // reset position (below)
  current.style.transition = "none";
  current.style.top = "100%";

  setTimeout(()=>{
    // move to center (visible)
    current.style.transition = "top 1s linear";
    current.style.top = "0%";
  },50);

  index = (index + 1) % photos.length;
}
</script>
