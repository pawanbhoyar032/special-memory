<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Reel</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
}

.box{
  width:90vw;
  max-width:260px;
  aspect-ratio:5/7;
  overflow:hidden;
  position:relative;
}

.photo{
  position:absolute;
  width:100%;
  height:100%;
  bottom:-100%;
}

.photo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

button{
  position:absolute;
  bottom:20px;
}
</style>
</head>

<body>

<div class="box">
  <div class="photo"><img src="photo1.jpg"></div>
  <div class="photo"><img src="photo2.jpg"></div>
  <div class="photo"><img src="photo3.jpg"></div>
</div>

<button onclick="start()">Play</button>

<audio id="music" src="music.mp3"></audio>

<script>

let photos = document.querySelectorAll(".photo");
let index = 0;
let started = false;
let interval;

function start(){
  if(started) return;
  started = true;

  const music = document.getElementById("music");
  music.currentTime = 0;
  music.play();

  // total duration per photo (sync basic)
  let duration = music.duration || 9; // fallback
  let perPhoto = duration / photos.length;

  show();
  interval = setInterval(show, perPhoto * 1000);

  music.onended = () => clearInterval(interval);
}

function show(){
  let current = photos[index];

  // reset position
  current.style.transition = "none";
  current.style.bottom = "-100%";

  setTimeout(()=>{
    current.style.transition = "bottom 1s linear";
    current.style.bottom = "100%"; // bottom → top
  },50);

  index = (index + 1) % photos.length;
}

</script>

</body>
</html>
