<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:#000;
  overflow:hidden;
  font-family:Arial;
}

.recorder-box{
  width:90vw;
  max-width:260px;
  aspect-ratio:5/7;
  overflow:hidden;
  position:relative;
  border-radius:15px;
}

.photo-card{
  position:absolute;
  width:100%;
  height:100%;
  bottom:-100%;
  left:0;
  transition:all 1.2s ease-in-out;
}

.photo-card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.blur{filter:blur(8px);}
.clear{filter:blur(0);}

.play-button{
  width:70px;
  height:70px;
  margin-top:20px;
  cursor:pointer;
}

.click-text{
  color:#fff;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="recorder-box">
  <div class="photo-card blur"><img src="photo1.jpg"></div>
  <div class="photo-card blur"><img src="photo2.jpg"></div>
  <div class="photo-card blur"><img src="photo3.jpg"></div>
</div>

<svg class="play-button" id="playBtn" viewBox="0 0 64 64">
  <circle cx="32" cy="32" r="30" fill="red"/>
  <polygon points="26,20 26,44 46,32" fill="white"/>
</svg>

<p class="click-text">I have a Surprise ❤️</p>

<audio id="bgMusic" src="music.mp3"></audio>

<script>

document.addEventListener("DOMContentLoaded", function(){

  const playBtn = document.getElementById("playBtn");
  const music = document.getElementById("bgMusic");
  const photos = document.querySelectorAll(".photo-card");

  let index = 0;
  let started = false;

  playBtn.addEventListener("click", function(){
    if(started) return;
    started = true;

    music.currentTime = 0;
    music.play();

    runReel();
  });

  function runReel(){
    const current = photos[index];
    const prev = photos[(index - 1 + photos.length) % photos.length];

    if(prev){
      prev.classList.remove("clear");
      prev.classList.add("blur");
      prev.style.transform = "translateY(-120%)";
    }

    current.style.transition = "none";
    current.style.transform = "translateY(100%)";

    setTimeout(function(){
      current.style.transition = "all 1.2s ease-in-out";
      current.style.transform = "translateY(-100%)";
      current.classList.remove("blur");
      current.classList.add("clear");
    }, 50);

    index = (index + 1) % photos.length;

    setTimeout(runReel, 3200);
  }

});

</script>

</body>
</html>.click-text {
    color: #fff;
    margin-top: 10px;
    font-size: 16px;
    text-align: center;
}

@media (max-width: 480px) {
    .click-text {
        font-size: 14px;
    }
}

</style>
</head>

<body>

<div class="glow"></div>

<div class="recorder-box">
    <div class="photo-card blur"><img src="photo1.jpg"></div>
    <div class="photo-card blur"><img src="photo2.jpg"></div>
    <div class="photo-card blur"><img src="photo3.jpg"></div>
</div>

<svg class="play-button" id="playBtn" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="30" fill="#ff4d4d"/>
    <polygon points="26,20 26,44 46,32" fill="white"/>
</svg>

<p class="click-text">I have a Surprise ❤️</p>

<audio id="bgMusic" src="music.mp3"></audio>

<script>

// sparkles
for(let i=0;i<40;i++){
    let s=document.createElement('div');
    s.className='sparkle';
    s.style.top=Math.random()*100+'vh';
    s.style.left=Math.random()*100+'vw';
    document.body.appendChild(s);
}

const playBtn = document.getElementById('playBtn');
const music = document.getElementById('bgMusic');
const photos = document.querySelectorAll('.photo-card');

let index = 0;
let isPlaying = false;

playBtn.addEventListener('click', function(){

    if(isPlaying) return;
    isPlaying = true;

    music.currentTime = 0;
    music.play();

    reel();
});

function reel(){
    const current = photos[index];
    const prev = photos[(index - 1 + photos.length) % photos.length];

    if(prev){
        prev.classList.remove('clear');
        prev.classList.add('blur');
        prev.style.transform = 'translateY(-120%) scale(0.95)';
    }

    current.style.transform = 'translateY(100%) scale(0.95)';

    setTimeout(()=>{
        current.style.transform = 'translateY(-100%) scale(1)';
        current.classList.remove('blur');
        current.classList.add('clear');
    }, 50);

    // 🎵 safe beat-like zoom
    let zoom = setInterval(()=>{
        current.style.transform = 'translateY(-100%) scale(1.05)';
        setTimeout(()=>{
            current.style.transform = 'translateY(-100%) scale(1)';
        },200);
    },800);

    setTimeout(()=> clearInterval(zoom),2500);

    index = (index + 1) % photos.length;
    setTimeout(reel, 3000);
}

</script>

</body>
</html>
