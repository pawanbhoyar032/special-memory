<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinematic Memory</title>

<style>
body {
    background: radial-gradient(circle at center, #120c08, #000000);
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Georgia', serif;
}

/* Sparkles */
.sparkle {
    position: fixed;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: white;
    box-shadow: 0 0 10px white, 0 0 20px gold;
    animation: sparkleAnim 2s infinite;
}

@keyframes sparkleAnim {
    0%,100% { opacity: 0.2; transform: scale(0.5); }
    50% { opacity: 1; transform: scale(1.5); }
}

/* Glow */
.glow {
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,200,100,0.08), transparent 60%);
    animation: moveGlow 10s linear infinite;
}

@keyframes moveGlow {
    0% { transform: translate(-30%, -30%); }
    50% { transform: translate(-10%, -10%); }
    100% { transform: translate(-30%, -30%); }
}

/* Photo box */
.recorder-box {
    width: 90vw;
    max-width: 260px;
    aspect-ratio: 5/7;
    overflow: hidden;
    border-radius: 20px;
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    border: 2px solid rgba(255,255,255,0.1);
}

/* Photos */
.photo-card {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 100%;
    left: 0;
}

.photo-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.blur { filter: blur(8px); }
.clear { filter: blur(0); }

/* Button */
.play-button {
    width: 70px;
    height: 70px;
    margin-top: 30px;
    cursor: pointer;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

.click-text {
    color: #fff;
    margin-top: 10px;
}

</style>
</head>

<body>

<div class="glow"></div>

<div class="recorder-box">
    <div class="photo-card blur"><img src="photo1.jpg"></div>
    <div class="photo-card blur"><img src="photo2.jpg"></div>
    <div class="photo-card blur"><img src="photo3.jpg"></div>
</div>

<svg class="play-button" id="playBtn" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="30" fill="#ff4d4d"/>
    <polygon points="26,20 26,44 46,32" fill="white"/>
</svg>

<p class="click-text">I have a Surprise ❤️</p>

<audio id="bgMusic" src="music.mp3"></audio>

<script>

// Sparkles
for(let i=0;i<40;i++){
    let s=document.createElement('div');
    s.className='sparkle';
    s.style.top=Math.random()*100+'vh';
    s.style.left=Math.random()*100+'vw';
    document.body.appendChild(s);
}

const playBtn = document.getElementById('playBtn');
const music = document.getElementById('bgMusic');
const photos = document.querySelectorAll('.photo-card');

let index = 0;
let isPlaying = false;

playBtn.addEventListener('click', function(){

    if(isPlaying) return;
    isPlaying = true;

    music.play();
    reel();
});

function reel(){

    // Reset all photos below
    photos.forEach(p => {
        p.style.transition = "none";
        p.style.transform = "translateY(100%) scale(0.95)";
    });

    const current = photos[index];

    // Show current
    setTimeout(() => {
        current.style.transition = "all 1s ease";
        current.style.transform = "translateY(0%) scale(1)";
        current.classList.remove('blur');
        current.classList.add('clear');
    }, 50);

    // Hide previous
    const prev = photos[(index - 1 + photos.length) % photos.length];

    if(prev){
        setTimeout(()=>{
            prev.style.transform = "translateY(-120%) scale(0.9)";
            prev.classList.remove('clear');
            prev.classList.add('blur');
        }, 800);
    }

    // Beat zoom effect
    let zoom = setInterval(()=>{
        current.style.transform = 'translateY(0%) scale(1.05)';
        setTimeout(()=>{
            current.style.transform = 'translateY(0%) scale(1)';
        },200);
    },800);

    setTimeout(()=> clearInterval(zoom),2500);

    index = (index + 1) % photos.length;
    setTimeout(reel, 3000);
}

</script>

</body>
</html>
