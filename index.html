<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinematic Memory</title>

<style>
body {
    background: radial-gradient(circle at center, #120c08, #000000);
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    min-height: 100vh;
}

/* Sparkles */
.sparkle {
    position: fixed;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: white;
    box-shadow: 0 0 10px white, 0 0 20px gold;
    animation: sparkleAnim 2s infinite;
}
@keyframes sparkleAnim {
    0%,100% { opacity: 0.2; }
    50% { opacity: 1; }
}

/* Glow */
.glow {
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,200,100,0.08), transparent 60%);
}

/* Box */
.recorder-box {
    width: 90vw;
    max-width: 260px;
    aspect-ratio: 5/7;
    overflow: hidden;
    border-radius: 20px;
    position: relative;
}

/* Photos */
.photo-card {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 100%;
}

/* Button */
.play-button {
    margin-top: 30px;
    width: 70px;
    height: 70px;
    cursor: pointer;
}

/* Text */
.play-text {
    color: white;
    margin-top: 10px;
}

/* Fade */
.fade-black {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 0;
    transition: 2s;
}

/* Thank you */
.thankyou {
    position: fixed;
    color: white;
    font-size: 32px;
    opacity: 0;
    transform: scale(0.5);
    transition: 1s;
}
.show {
    opacity: 1;
    transform: scale(1);
}
</style>
</head>

<body>

<div class="glow"></div>

<div class="recorder-box">
    <div class="photo-card"><img src="photo1.jpg" width="100%" height="100%"></div>
    <div class="photo-card"><img src="photo2.jpg" width="100%" height="100%"></div>
    <div class="photo-card"><img src="photo3.jpg" width="100%" height="100%"></div>
</div>

<svg class="play-button" id="playBtn" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="30" fill="red"/>
    <polygon points="26,20 26,44 46,32" fill="white"/>
</svg>

<p class="play-text">I have Surprise 🫠</p>

<div class="fade-black" id="fadeBlack"></div>
<div class="thankyou" id="thankText">Thank You ❤️</div>

<audio id="bgMusic" src="music.mp3"></audio>

<script>

// sparkles
for(let i=0;i<40;i++){
    let s=document.createElement('div');
    s.className='sparkle';
    s.style.top=Math.random()*100+'vh';
    s.style.left=Math.random()*100+'vw';
    document.body.appendChild(s);
}

const btn = document.getElementById('playBtn');
const music = document.getElementById('bgMusic');
const photos = document.querySelectorAll('.photo-card');
const fadeBlack = document.getElementById('fadeBlack');
const thankText = document.getElementById('thankText');

let index = 0;
let loopTimer = null;

btn.onclick = () => {

    // reset first
    resetAll();

    music.currentTime = 0;
    music.play().catch(()=>{});

    loopPhotos();
};

function loopPhotos(){

    const current = photos[index];

    current.style.transition="none";
    current.style.transform="translateY(100%)";

    setTimeout(()=>{
        current.style.transition="1s linear";
        current.style.transform="translateY(0%)";
    },50);

    setTimeout(()=>{
        current.style.transform="translateY(-100%)";
    },1000);

    index = (index+1)%photos.length;

    loopTimer = setTimeout(loopPhotos,1200);
}

// song end
music.onended = () => {

    clearTimeout(loopTimer);

    fadeBlack.style.opacity = "1";

    setTimeout(()=>{
        thankText.classList.add("show");
    },2000);

    // reset after showing
    setTimeout(()=>{
        resetAll();
    },5000);
};

// reset function
function resetAll(){

    clearTimeout(loopTimer);

    index = 0;

    photos.forEach(p=>{
        p.style.transition="none";
        p.style.transform="translateY(100%)";
    });

    fadeBlack.style.opacity = "0";
    thankText.classList.remove("show");
}
</script>

</body>
</html>
