<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Loop</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
}

.box{
  width:90vw;
  max-width:260px;
  aspect-ratio:5/7;
  overflow:hidden;
  position:relative;
}

.photo{
  position:absolute;
  width:100%;
  height:100%;
  bottom:-100%;
  transition:all 1s ease;
}

.photo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.blur{filter:blur(8px);}
.clear{filter:blur(0);}

button{
  position:absolute;
  bottom:20px;
}
</style>
</head>

<body>

<div class="box">
  <div class="photo blur"><img src="photo1.jpg"></div>
  <div class="photo blur"><img src="photo2.jpg"></div>
  <div class="photo blur"><img src="photo3.jpg"></div>
</div>

<button onclick="start()">Play</button>

<audio id="music" src="music.mp3"></audio>

<script>

let photos = document.querySelectorAll(".photo");
let index = 0;
let started = false;

function start(){
  if(started) return;
  started = true;

  document.getElementById("music").play();
  show();
}

function show(){
  let current = photos[index];
  let prev = photos[(index-1+photos.length)%photos.length];

  // previous blur + move
  prev.classList.remove("clear");
  prev.classList.add("blur");
  prev.style.transform = "translateY(-120%)";

  // current show
  current.style.transform = "translateY(-100%)";
  current.classList.remove("blur");
  current.classList.add("clear");

  index = (index+1)%photos.length;

  setTimeout(show,3000);
}

</script>

</body>
</html>
