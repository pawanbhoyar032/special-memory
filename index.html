<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory</title>

<style>
body {
    background: black;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: Georgia, serif;
}

/* Photo box */
.recorder-box {
    width: 90vw;
    max-width: 260px;
    aspect-ratio: 5/7;
    overflow: hidden;
    border-radius: 15px;
    position: relative;
}

/* Photos */
.photo-card {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 100%;
    left: 0;
}

/* Button */
.play-button {
    position: absolute;
    bottom: 40px;
    width: 70px;
    height: 70px;
    cursor: pointer;
}

/* Black overlay */
.fade-black {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 0;
    pointer-events: none;
    transition: opacity 2s;
}

/* Thank you text */
.thankyou {
    position: fixed;
    color: white;
    font-size: 32px;
    opacity: 0;
    transform: scale(0.5);
    transition: all 1s ease;
}

.show {
    opacity: 1;
    transform: scale(1);
}
</style>
</head>

<body>

<div class="recorder-box">
    <div class="photo-card"><img src="photo1.jpg" width="100%" height="100%"></div>
    <div class="photo-card"><img src="photo2.jpg" width="100%" height="100%"></div>
    <div class="photo-card"><img src="photo3.jpg" width="100%" height="100%"></div>
</div>

<svg class="play-button" id="playBtn" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="30" fill="red"/>
    <polygon points="26,20 26,44 46,32" fill="white"/>
</svg>

<div class="fade-black" id="fadeBlack"></div>
<div class="thankyou" id="thankText">Thank You ❤️</div>

<audio id="bgMusic" src="music.mp3"></audio>

<script>

const btn = document.getElementById('playBtn');
const music = document.getElementById('bgMusic');
const photos = document.querySelectorAll('.photo-card');
const fadeBlack = document.getElementById('fadeBlack');
const thankText = document.getElementById('thankText');

let index = 0;
let started = false;

btn.onclick = () => {
    if(started) return;
    started = true;

    music.play();
    loopPhotos();
};

function loopPhotos(){

    // reset all
    photos.forEach(p=>{
        p.style.transition="none";
        p.style.transform="translateY(100%)";
    });

    const current = photos[index];

    setTimeout(()=>{
        current.style.transition="transform 1s linear";
        current.style.transform="translateY(0%)";
    },50);

    // move up and hide
    setTimeout(()=>{
        current.style.transform="translateY(-100%)";
    },2000);

    index = (index+1)%photos.length;

    // continue loop until song ends
    if(!music.ended){
        setTimeout(loopPhotos,3000);
    }
}

// When song ends
music.onended = () => {

    fadeBlack.style.opacity = "1";

    setTimeout(()=>{
        thankText.classList.add("show");
    },2000);
};

</script>

</body>
</html>
