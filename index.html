<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Continuous Photo Loop</title>

<style>
    body {
        background: radial-gradient(circle at center, #120c08, #000000);
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
        font-family: 'Georgia', serif;
    }

    /* Background Glow */
    .glow {
        position: fixed;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle, rgba(255,200,100,0.05), transparent 70%);
        pointer-events: none;
    }

    /* Photo Container */
    .recorder-box {
        width: 280px;
        aspect-ratio: 5/7;
        overflow: hidden;
        border-radius: 20px;
        position: relative;
        box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        border: 2px solid rgba(255, 255, 255, 0.1);
    }

    /* The Moving Reel (हा भाग फोटोंना लूपमध्ये फिरवतो) */
    .reel-container {
        display: flex;
        flex-direction: column;
        height: 100%;
        /* अ‍ॅनिमेशन सुरूवातीला थांबलेले असेल */
        animation: scrollLoop 10s linear infinite;
        animation-play-state: paused; 
    }

    .photo-card {
        width: 100%;
        height: 100%;
        flex-shrink: 0;
    }

    .photo-card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* Continuous Loop Animation */
    @keyframes scrollLoop {
        0% { transform: translateY(0); }
        100% { transform: translateY(-300%); } /* ३ फोटो आहेत म्हणून ३००% */
    }

    /* Play Button */
    .play-button {
        width: 70px;
        height: 70px;
        margin-top: 30px;
        cursor: pointer;
        z-index: 10;
        transition: 0.3s;
    }

    .play-button:active { transform: scale(0.9); }

    .pulse { animation: pulse 1.5s infinite; }
    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.1); }
        100% { transform: scale(1); }
    }

    .click-text {
        color: #fff;
        margin-top: 15px;
        opacity: 0.8;
    }
</style>
</head>
<body>

<div class="glow"></div>

<div class="recorder-box">
    <div class="reel-container" id="reel">
        <div class="photo-card"><img src="photo1.jpg"></div>
        <div class="photo-card"><img src="photo2.jpg"></div>
        <div class="photo-card"><img src="photo3.jpg"></div>
        <div class="photo-card"><img src="photo1.jpg"></div>
    </div>
</div>

<svg class="play-button pulse" id="playBtn" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="30" fill="#ff4d4d"/>
    <polygon points="26,20 26,44 46,32" fill="white"/>
</svg>

<p class="click-text">I have Surprise ❤️</p>

<audio id="bgMusic" src="music.mp3" loop></audio>

<script>
    const playBtn = document.getElementById('playBtn');
    const music = document.getElementById('bgMusic');
    const reel = document.getElementById('reel');

    playBtn.addEventListener('click', function() {
        // म्युझिक प्ले करणे
        music.play();
        
        // अ‍ॅनिमेशन सुरू करणे
        reel.style.animationPlayState = 'running';
        
        // बटण लपवणे किंवा फिकट करणे
        playBtn.classList.remove('pulse');
        playBtn.style.opacity = '0.3';
        playBtn.style.pointerEvents = 'none';
    });
</script>

</body>
</html>
