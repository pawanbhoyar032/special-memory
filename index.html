<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special Memory</title>

<style>
body{
    margin:0;
    background:radial-gradient(circle,#120c08,#000);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    overflow:hidden;
}

/* sparkles */
.sparkle{
    position:fixed;
    width:4px;height:4px;
    background:white;
    border-radius:50%;
    animation:blink 2s infinite;
}
@keyframes blink{
    0%,100%{opacity:.2}
    50%{opacity:1}
}

/* glow */
.glow{
    position:fixed;
    width:200%;height:200%;
    background:radial-gradient(circle,rgba(255,200,100,.08),transparent);
}

/* box */
.box{
    width:260px;
    aspect-ratio:5/7;
    overflow:hidden;
    position:relative;
    border-radius:20px;
}

/* photo */
.photo{
    position:absolute;
    width:100%;
    height:100%;
    top:100%;
}

/* button */
.play{
    margin-top:20px;
    cursor:pointer;
}

/* text */
.text{
    color:#fff;
    margin-top:10px;
}

/* fade */
.fade{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    opacity:0;
    transition:2s;
}

/* thank */
.thank{
    position:fixed;
    color:#fff;
    font-size:30px;
    opacity:0;
    transform:scale(.5);
    transition:1s;
}
.show{
    opacity:1;
    transform:scale(1);
}
</style>
</head>

<body>

<div class="glow"></div>

<div class="box">
<div class="photo"><img src="photo1.jpg" width="100%" height="100%"></div>
<div class="photo"><img src="photo2.jpg" width="100%" height="100%"></div>
<div class="photo"><img src="photo3.jpg" width="100%" height="100%"></div>
</div>

<svg class="play" id="btn" width="70" height="70" viewBox="0 0 64 64">
<circle cx="32" cy="32" r="30" fill="red"/>
<polygon points="26,20 26,44 46,32" fill="white"/>
</svg>

<div class="text">I have Surprise 🫠</div>

<div class="fade" id="fade"></div>
<div class="thank" id="thank">Thank You ❤️</div>

<audio id="music" src="music.mp3"></audio>

<script>

// sparkles
for(let i=0;i<40;i++){
 let s=document.createElement('div');
 s.className='sparkle';
 s.style.top=Math.random()*100+'vh';
 s.style.left=Math.random()*100+'vw';
 document.body.appendChild(s);
}

const btn=document.getElementById('btn');
const music=document.getElementById('music');
const photos=document.querySelectorAll('.photo');
const fade=document.getElementById('fade');
const thank=document.getElementById('thank');

let i=0;
let running=false;
let rafId=null;

// play
btn.onclick=()=>{

 if(running){
   reset();
 }

 running=true;

 animateLoop();

 music.currentTime=0;
 music.play().catch(()=>{});
};

// 🔥 smoother animation using requestAnimationFrame
function animateLoop(){

 let start=null;

 function frame(time){

   if(!running) return;

   if(!start) start=time;
   let progress=time-start;

   if(progress<1000){
      photos[i].style.transform=`translateY(${100-progress/10}%)`;
   }
   else if(progress<2000){
      photos[i].style.transform=`translateY(-${(progress-1000)/10}%)`;
   }
   else{
      i=(i+1)%photos.length;
      start=time;
   }

   rafId=requestAnimationFrame(frame);
 }

 rafId=requestAnimationFrame(frame);
}

// end
music.onended=()=>{

 running=false;
 cancelAnimationFrame(rafId);

 fade.style.opacity=1;

 setTimeout(()=>{
   thank.classList.add('show');
 },2000);
};

// reset
function reset(){

 running=false;
 cancelAnimationFrame(rafId);

 i=0;

 photos.forEach(p=>{
   p.style.transform="translateY(100%)";
   p.style.transition="none";
 });

 fade.style.opacity=0;
 thank.classList.remove('show');

 music.pause();
 music.currentTime=0;
}
</script>

</body>
</html>
