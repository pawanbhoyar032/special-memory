<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinematic Memory Reel</title>

<style>
    :root {
        --bg-color: #000000;
    }

    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: var(--bg-color);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        font-family: 'Georgia', serif;
    }

    /* Cinematic Edges (Vignette) */
    body::after {
        content: '';
        position: fixed;
        inset: 0;
        box-shadow: inset 0 0 150px rgba(0,0,0,0.9);
        pointer-events: none;
        z-index: 20;
    }

    /* Sparkle & Glow Background */
    #canvas {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: 1;
        pointer-events: none;
        opacity: 0;
        transition: opacity 2s ease;
    }

    /* Initial Black Fade Layer */
    #overlay {
        position: fixed;
        inset: 0;
        background: black;
        z-index: 100;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: background 2s ease, opacity 2s ease;
    }

    /* Photo Container */
    .recorder-box {
        width: 85vw;
        max-width: 300px;
        aspect-ratio: 5/7;
        overflow: hidden;
        border-radius: 15px;
        position: relative;
        z-index: 5;
        opacity: 0;
        transform: scale(0.9);
        transition: all 2s ease;
        box-shadow: 0 0 50px rgba(0,0,0,1);
    }

    .reel {
        display: flex;
        flex-direction: column;
        height: 100%;
        /* Animation: 18s total for smooth transitions and pauses */
        animation: smoothSlide 18s cubic-bezier(0.45, 0, 0.55, 1) infinite;
        animation-play-state: paused;
    }

    .photo-card {
        width: 100%;
        height: 100%;
        flex-shrink: 0;
    }

    .photo-card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    @keyframes smoothSlide {
        0%, 28% { transform: translateY(0); }
        33%, 61% { transform: translateY(-100%); }
        66%, 94% { transform: translateY(-200%); }
        100% { transform: translateY(-300%); }
    }

    /* Play Button & Text */
    #playBtn {
        width: 80px;
        height: 80px;
        cursor: pointer;
        fill: #ff4d4d;
        filter: drop-shadow(0 0 15px rgba(255,77,77,0.6));
        transition: transform 0.3s ease;
        z-index: 101;
        animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.1); }
        100% { transform: scale(1); }
    }

    .surprise-text {
        color: white;
        margin-top: 20px;
        font-size: 18px;
        letter-spacing: 1px;
        text-align: center;
        z-index: 101;
        opacity: 0.8;
    }

    /* End Message */
    #thankYou {
        position: fixed;
        color: white;
        font-size: 26px;
        letter-spacing: 2px;
        opacity: 0;
        z-index: 102;
        transition: opacity 2s ease;
        text-align: center;
    }

    .visible { opacity: 1 !important; }
    .hidden { opacity: 0 !important; pointer-events: none; transition: opacity 0.8s ease; }

</style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="overlay">
        <svg id="playBtn" viewBox="0 0 64 64">
            <circle cx="32" cy="32" r="30" />
            <polygon points="26,20 26,44 46,32" fill="white"/>
        </svg>
        <p class="surprise-text" id="msgText">I have a Surprise ❤️</p>
    </div>

    <div class="recorder-box" id="box">
        <div class="reel" id="reel">
            <div class="photo-card"><img src="photo1.jpg"></div>
            <div class="photo-card"><img src="photo2.jpg"></div>
            <div class="photo-card"><img src="photo3.jpg"></div>
            <div class="photo-card"><img src="photo1.jpg"></div>
        </div>
    </div>

    <div id="thankYou">Thank You 🐣</div>

    <audio id="bgMusic" src="music.mp3"></audio>

<script>
    const playBtn = document.getElementById('playBtn');
    const msgText = document.getElementById('msgText');
    const music = document.getElementById('bgMusic');
    const overlay = document.getElementById('overlay');
    const box = document.getElementById('box');
    const reel = document.getElementById('reel');
    const thankYou = document.getElementById('thankYou');
    const canvas = document.getElementById('canvas');

    playBtn.addEventListener('click', () => {
        music.play();
        
        // बटन आणि टेक्स्ट लपवणे
        playBtn.classList.add('hidden');
        msgText.classList.add('hidden');
        
        // बॅकग्राउंड ट्रान्सपरंट करणे जेणेकरून फोटो दिसतील
        overlay.style.background = "transparent";
        
        // फोटो बॉक्स आणि स्पार्कल सुरू करणे
        box.classList.add('visible');
        box.style.transform = "scale(1)";
        canvas.classList.add('visible');
        
        reel.style.animationPlayState = 'running';
        
        initParticles();
    });

    music.onended = function() {
        overlay.style.background = "black";
        overlay.classList.remove('hidden');
        box.classList.remove('visible');
        canvas.classList.remove('visible');
        
        setTimeout(() => {
            thankYou.classList.add('visible');
        }, 1000);
    };

    // Sparkle Canvas Logic
    const ctx = canvas.getContext('2d');
    let particles = [];

    function initParticles() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        for(let i=0; i<60; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 0.5,
                speed: Math.random() * 0.4 + 0.1,
                opacity: Math.random()
            });
        }
        animate();
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
            p.y -= p.speed;
            if(p.y < 0) p.y = canvas.height;
            ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
        });
        requestAnimationFrame(animate);
    }
</script>

</body>
</html>
